<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Nearby Matches</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        .hidden { display: none; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 10px; max-width: 300px; margin: auto; }
        button { padding: 10px 20px; cursor: pointer; background: #ff4081; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="step1">
        <h1>আমাদের প্ল্যাটফর্মে স্বাগতম</h1>
        <p>নির্দেশনা: নিয়মগুলো মেনে এগিয়ে যান।</p>
        <button onclick="showLoading()">I Agree</button>
    </div>

    <div id="step2" class="hidden">
        <h2>প্রসেসিং হচ্ছে...</h2>
    </div>

    <div id="step3" class="hidden">
        <p>আপনার আশেপাশের সিঙ্গেল মহিলাদের খুঁজতে আপনার লোকেশন অন করা জরুরী।</p>
        <button onclick="requestLocation()">OK</button>
    </div>

    <div id="step4" class="hidden">
        <div class="card">
            <img src="https://via.placeholder.com/100" alt="Profile">
            <h3>সাবিনা, ২৪ বছর</h3>
            <p>আপনার থেকে মাত্র ১.২ কিমি দূরে</p>
            <button>মেসেজ দিন</button>
        </div>
    </div>

    <script>
        function showLoading() {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            }, 2000);
        }

        function requestLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(() => {
                    document.getElementById('step3').classList.add('hidden');
                    document.getElementById('step4').classList.remove('hidden');
                }, () => {
                    alert("লোকেশন পারমিশন পাওয়া যায়নি।");
                });
            }
        }
    </script>
</body>
</html>
