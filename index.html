<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnlineFriendship And More</title>

    <!-- Meta Tags for Facebook & SEO -->
    <meta property="og:title" content="OnlineFriendship And More">
    <meta property="og:description" content="Join Us Now">
    <meta property="og:image" content="fbxx1.webp">
    <meta property="og:type" content="website">
    
    <!-- Preload Assets for Superfast Loading -->
    <link rel="preload" as="image" href="fbxx1.webp">
    <link rel="preload" as="image" href="rxx1.webp">

    <style>
        /* CSS Reset & Optimization */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 9:16 Full Screen Container */
        .landing-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 576px;
            margin: 0 auto;
            background-image: url('fbxx1.webp');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 40px; /* ডিসপ্লের নিচ থেকে হাফ ইঞ্চি উপরে */
        }

        /* Messenger Audio Player Style */
        .audio-container {
            width: 85%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            padding: 8px 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            
            /* শাইনিং এবং পপআপ অ্যানিমেশন */
            animation: audioPopShine 3s infinite ease-in-out;
        }

        /* Profile Picture (Round) */
        .profile-pic {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0084FF;
        }

        /* Play/Pause Button */
        .play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #0084FF;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            outline: none;
        }

        .play-btn svg {
            width: 14px;
            height: 14px;
            fill: #fff;
        }

        /* Fake Messenger Waveform */
        .audio-wave {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 3px;
            height: 20px;
        }

        .wave-bar {
            flex-grow: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
            transition: background 0.3s;
        }

        .audio-container.playing .wave-bar {
            background: #0084FF;
            animation: waveMotion 1.2s infinite ease-in-out;
        }

        /* Waveform Animation Details */
        .wave-bar:nth-child(1) { height: 40%; animation-delay: 0.1s; }
        .wave-bar:nth-child(2) { height: 75%; animation-delay: 0.3s; }
        .wave-bar:nth-child(3) { height: 50%; animation-delay: 0.5s; }
        .wave-bar:nth-child(4) { height: 90%; animation-delay: 0.2s; }
        .wave-bar:nth-child(5) { height: 60%; animation-delay: 0.4s; }

        /* Audio Pop & Shine Animation */
        @keyframes audioPopShine {
            0% { transform: scale(1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
            45% { transform: scale(1.03); box-shadow: 0 12px 40px rgba(0, 132, 255, 0.4); background: rgba(255, 255, 255, 0.25); }
            50% { transform: scale(1.03); }
            55% { transform: scale(1.03); }
            100% { transform: scale(1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        }

        @keyframes waveMotion {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.4); }
        }

        /* Premium Sign-up Button Style */
        .signup-btn {
            width: 85%;
            max-width: 320px;
            padding: 14px 20px;
            background: linear-gradient(135deg, #FF416C, #FF4B2B);
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4);
            letter-spacing: 0.5px;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            animation: pulseGlow 2s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 12px 30px rgba(255, 75, 43, 0.6); }
            100% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4); }
        }

        /* Click Effect */
        .signup-btn:active {
            transform: scale(0.95) !important;
            box-shadow: 0 4px 10px rgba(255, 75, 43, 0.3);
        }
    </style>
</head>
<body>

    <!-- Hidden Audio Element -->
    <audio id="messengerAudio" src="rx1.mp3" preload="auto"></audio> <!-- অডিও ফাইলের নাম rx1.mp3 বা rx1.ogg দিতে পারেন -->

    <div class="landing-container">
        
        <!-- Messenger Audio Player -->
        <div class="audio-container" id="audioBox">
            <img src="rxx1.webp" alt="Profile" class="profile-pic"> <!-- প্রোফাইল পিকচার rxx1.webp -->
            <button class="play-btn" id="playBtn">
                <!-- Play Icon -->
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <!-- Pause Icon (Hidden by default) -->
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <div class="audio-wave">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
            </div>
        </div>

        <!-- Premium Affiliate Sign-up Button -->
        <a href="https://paysale.g2afse.com/sl?id=6707ff5cbb23f2139d89e9bf&pid=125904" class="signup-btn" id="subBtn">
            🔥Sign-up Now🔥
        </a>
    </div>

    <script>
        const targetUrl = "https://paysale.g2afse.com/sl?id=6707ff5cbb23f2139d89e9bf&pid=125904";

        // ১. ফেসবুক ইন-অ্যাপ ব্রাউজার ব্লকার (ইউজারকে ক্রোম বা এক্সটার্নাল ব্রাউজারে পুশ করবে)
        function forceExternalBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isFacebook = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
            
            if (isFacebook) {
                // অ্যান্ড্রয়েডের জন্য সরাসরি ক্রোম বা ডিফল্ট ব্রাউজারে ওপেন করার ট্রিকস
                if (ua.indexOf("Android") > -1) {
                    const chromeUrl = "intent://" + window.location.href.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
                    window.location.href = chromeUrl;
                } else {
                    // iOS বা অন্যান্য ক্ষেত্রে ডাউনলোডের মতো বা সরাসরি ব্রাউজার ওপেন করার চেষ্টা
                    window.location.href = targetUrl;
                }
            }
        }
        // পেজ লোড হওয়া মাত্রই রান হবে
        forceExternalBrowser();

        // ২. বাটন ক্লিক এবং হ্যাপটিক ভাইব্রেশন হ্যান্ডলার
        const subBtn = document.getElementById('subBtn');
        subBtn.addEventListener('click', function(e) {
            if (navigator.vibrate) {
                navigator.vibrate(15); 
            }
        });

        // ৩. অডিও প্লেয়ার কন্ট্রোল (মেসেঞ্জার স্টাইল)
        const audio = document.getElementById('messengerAudio');
        const playBtn = document.getElementById('playBtn');
        const audioBox = document.getElementById('audioBox');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');

        playBtn.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                audioBox.classList.add('playing');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                audioBox.classList.remove('playing');
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        });

        // অডিও শেষ হয়ে গেলে আবার নরমাল মুডে ফিরে আসবে
        audio.addEventListener('ended', function() {
            audioBox.classList.remove('playing');
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });
    </script>
</body>
</html>
