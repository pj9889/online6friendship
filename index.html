    <style>
        /* CSS Reset & Optimization */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 9:16 Full Screen Container */
        .landing-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 576px;
            margin: 0 auto;
            background-image: url('fbxx1.webp');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* অ্যাড উপরে এবং কন্টেন্ট নিচে রাখার জন্য */
            align-items: center;
            padding-bottom: 40px; /* ডিসপ্লের নিচ থেকে হাফ ইঞ্চি উপরে বাটন থাকবে */
        }

        /* Top Ad Styling (For Maximum Earning) */
        .top-ad-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 10px; /* স্ক্রিনের সামান্য নিচে নামানোর জন্য */
            z-index: 100;
        }

        /* Bottom Content Wrapper (Audio + Button) */
        .bottom-content-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Instruction Text above Audio Box */
        .audio-instruction {
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 0.5px;
            animation: textGlow 1.5s infinite alternate;
        }

        @keyframes textGlow {
            from { opacity: 0.7; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); text-shadow: 0 0 8px rgba(0, 132, 255, 0.8); }
        }

        /* Messenger Audio Player Style */
        .audio-container {
            width: 85%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 8px 12px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: audioPop 4s infinite ease-in-out;
        }

        /* Profile Picture (Round) */
        .profile-pic {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0084FF;
        }

        /* Play/Pause Button with Movement Animation */
        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0084FF;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 132, 255, 0.6);
            transition: transform 0.1s ease;
            animation: btnMovement 1.2s infinite ease-in-out;
        }

        /* ক্লিকের মুভমেন্ট ইফেক্ট */
        .play-btn:active {
            transform: scale(0.85) !important;
            background: #0066cc;
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        /* প্লে বাটনের কন্টিনিউয়াস মুভমেন্ট অ্যানিমেশন */
        @keyframes btnMovement {
            0% { transform: scale(1); box-shadow: 0 0 8px rgba(0, 132, 255, 0.6); }
            50% { transform: scale(1.12); box-shadow: 0 0 18px rgba(0, 132, 255, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 8px rgba(0, 132, 255, 0.6); }
        }

        /* Fake Messenger Waveform */
        .audio-wave {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 3px;
            height: 20px;
        }

        .wave-bar {
            flex-grow: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
        }

        .audio-container.playing .wave-bar {
            background: #0084FF;
            animation: waveMotion 1.2s infinite ease-in-out;
        }

        .wave-bar:nth-child(1) { height: 40%; animation-delay: 0.1s; }
        .wave-bar:nth-child(2) { height: 75%; animation-delay: 0.3s; }
        .wave-bar:nth-child(3) { height: 50%; animation-delay: 0.5s; }
        .wave-bar:nth-child(4) { height: 90%; animation-delay: 0.2s; }
        .wave-bar:nth-child(5) { height: 60%; animation-delay: 0.4s; }

        @keyframes audioPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); background: rgba(255, 255, 255, 0.22); }
        }

        @keyframes waveMotion {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.3); }
        }

        /* Premium Sign-up Button Style */
        .signup-btn {
            width: 85%;
            max-width: 320px;
            padding: 14px 20px;
            background: linear-gradient(135deg, #FF416C, #FF4B2B);
            color: #ffffff;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4);
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            outline: none;
            animation: pulseGlow 2s infinite ease-in-out;
            transition: transform 0.1s ease;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4); }
            50% { transform: scale(1.03); box-shadow: 0 12px 30px rgba(255, 75, 43, 0.6); }
            100% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 75, 43, 0.4); }
        }

        /* Sign up Button Click Effect */
        .signup-btn:active {
            transform: scale(0.95) !important;
            box-shadow: 0 4px 10px rgba(255, 75, 43, 0.3);
        }
    </style>
</head>
<body>

    <!-- Hidden Audio Element -->
    <audio id="messengerAudio" src="rx1.mpeg" preload="auto"></audio>

    <div class="landing-container">
        
        <!-- ================= BANNER AD START ================= -->
        <div class="top-ad-wrapper">
            <script>
                atOptions = {
                    'key' : '25ef1589e1cf5779ebd8a1dda463b14c',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/25ef1589e1cf5779ebd8a1dda463b14c/invoke.js"></script>
        </div>
        <!-- ================= BANNER AD END ================= -->

        <!-- Bottom UI Section -->
        <div class="bottom-content-box">
            <!-- English Instruction Text -->
            <div class="audio-instruction">🎵 Tap to play the voice message</div>

            <!-- Messenger Audio Player -->
            <div class="audio-container" id="audioBox">
                <img src="rxx1.webp" alt="Profile" class="profile-pic">
                <button class="play-btn" id="playBtn">
                    <!-- Play Icon -->
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <!-- Pause Icon -->
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="audio-wave">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>

            <!-- Premium Affiliate Sign-up Button -->
            <button class="signup-btn" id="subBtn">
                🔥Sign-up Now🔥
            </button>
        </div>

    </div>

    <script>
        const targetUrl = "https://paysale.g2afse.com/sl?id=6707ff5cbb23f2139d89e9bf&pid=125904";

        // ক্রোম ব্রাউজার প্রটেকশন হ্যান্ডলার (শুধু ক্রোমে লিংক ওপেন করানোর ট্রিক)
        function openInChrome(url) {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /Android/i.test(ua);
            
            if (isAndroid) {
                // অ্যান্ড্রয়েডে সরাসরি ক্রোম অ্যাপে লিংক ফোর্স করার ইন্টেন্ট ট্রিকস
                const chromeIntent = "intent://" + url.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
                window.location.href = chromeIntent;
            } else {
                // iOS বা অন্যান্য ডিভাইসের ক্ষেত্রে নরমাল রিডাইরেক্ট
                window.location.href = url;
            }
        }

        // সাইন আপ বাটন ক্লিক ইভেন্ট
        const subBtn = document.getElementById('subBtn');
        subBtn.addEventListener('click', function() {
            if (navigator.vibrate) {
                navigator.vibrate(15); 
            }
            openInChrome(targetUrl);
        });

        // ইনস্ট্যান্ট অডিও প্লেয়ার কন্ট্রোল
        const audio = document.getElementById('messengerAudio');
        const playBtn = document.getElementById('playBtn');
        const audioBox = document.getElementById('audioBox');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');

        // পেজ লোড হওয়া মাত্রই অডিও লোড নিশ্চিত করা
        window.addEventListener('DOMContentLoaded', () => {
            audio.load();
        });

        playBtn.addEventListener('click', function() {
            if (audio.paused) {
                audio.play().catch(error => console.log("Audio play failed:", error));
                audioBox.classList.add('playing');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playBtn.style.animation = 'none'; 
            } else {
                audio.pause();
                audioBox.classList.remove('playing');
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playBtn.style.animation = 'btnMovement 1.2s infinite ease-in-out'; 
            }
        });

        // অডিও শেষ হয়ে গেলে আবার পূর্বের অবস্থায় ফিরে যাবে
        audio.addEventListener('ended', function() {
            audioBox.classList.remove('playing');
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
            playBtn.style.animation = 'btnMovement 1.2s infinite ease-in-out';
        });
    </script>
</body>
</html>
