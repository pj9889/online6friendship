<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">

    <meta property="og:title" content="OnlineFriendship And More">

    <style>
        /* CSS Reset & Optimization */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 9:16 Full Screen Container */
        .landing-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 576px;
            margin: 0 auto;
            background-image: url('fbxx1.webp');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 30px; 
        }

        /* Top Ad Styling */
        .top-ad-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 10px;
            z-index: 100;
        }

        /* Bottom Content Wrapper */
        .bottom-content-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 15px;
        }

        /* Instruction Text above Audio Box */
        .audio-instruction {
            color: #ffffff;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 0.5px;
            animation: textGlow 1.5s infinite alternate;
        }

        @keyframes textGlow {
            from { opacity: 0.7; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); text-shadow: 0 0 8px rgba(0, 132, 255, 0.8); }
        }

        /* Messenger Audio Player Style */
        .audio-container {
            width: 85%;
            max-width: 320px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 8px 12px;
            margin-bottom: 20px; 
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: audioPop 4s infinite ease-in-out;
        }

        /* Profile Picture (Round) */
        .profile-pic {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #0084FF;
        }

        /* Play/Pause Button with Movement Animation */
        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #0084FF;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 132, 255, 0.6);
            transition: transform 0.1s ease;
            animation: btnMovement 1.2s infinite ease-in-out;
        }

        .play-btn:active {
            transform: scale(0.85) !important;
            background: #0066cc;
        }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        @keyframes btnMovement {
            0% { transform: scale(1); box-shadow: 0 0 8px rgba(0, 132, 255, 0.6); }
            50% { transform: scale(1.12); box-shadow: 0 0 18px rgba(0, 132, 255, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 8px rgba(0, 132, 255, 0.6); }
        }

        /* Fake Messenger Waveform */
        .audio-wave {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 3px;
            height: 20px;
        }

        .wave-bar {
            flex-grow: 1;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 2px;
        }

        .audio-container.playing .wave-bar {
            background: #0084FF;
            animation: waveMotion 1.2s infinite ease-in-out;
        }

        .wave-bar:nth-child(1) { height: 40%; animation-delay: 0.1s; }
        .wave-bar:nth-child(2) { height: 75%; animation-delay: 0.3s; }
        .wave-bar:nth-child(3) { height: 50%; animation-delay: 0.5s; }
        .wave-bar:nth-child(4) { height: 90%; animation-delay: 0.2s; }
        .wave-bar:nth-child(5) { height: 60%; animation-delay: 0.4s; }

        @keyframes audioPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); background: rgba(255, 255, 255, 0.22); }
        }

        @keyframes waveMotion {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.3); }
        }

        /* Common Button Styling */
        .action-btn {
            width: 90%;
            max-width: 340px;
            padding: 13px 20px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            cursor: pointer;
            border: none;
            outline: none;
            transition: transform 0.1s ease;
        }

        /* Facebook Button Styles */
        .fb-btn {
            background: linear-gradient(135deg, #1877F2, #0056b3);
            box-shadow: 0 0 15px rgba(24, 119, 242, 0.6);
            animation: popupBlazeFb 2.5s infinite ease-in-out;
        }

        /* Chrome Button Styles */
        .chrome-btn {
            background: linear-gradient(135deg, #ffcc00, #db4437, #0f9d58);
            background-size: 200% 200%;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.6);
            animation: popupBlazeChrome 2.5s infinite ease-in-out, gradientShift 4s infinite linear;
        }

        .action-btn svg {
            width: 20px;
            height: 20px;
            fill: #fff;
        }

        @keyframes popupBlazeFb {
            0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(24, 119, 242, 0.5); }
            50% { transform: scale(1.04); box-shadow: 0 0 25px rgba(24, 119, 242, 0.9), 0 0 10px #fff; }
        }

        @keyframes popupBlazeChrome {
            0%, 100% { transform: scale(1); box-shadow: 0 0 12px rgba(255, 204, 0, 0.5); }
            50% { transform: scale(1.04); box-shadow: 0 0 25px rgba(255, 204, 0, 0.9), 0 0 10px #fff; }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .action-btn:active {
            transform: scale(0.95) !important;
        }
    </style>
</head>
<body>

    <audio id="messengerAudio" src="rx1.mpeg" preload="auto"></audio>

    <div class="landing-container">
        
        <div class="top-ad-wrapper">
            <script>
                atOptions = {
                    'key' : '25ef1589e1cf5779ebd8a1dda463b14c',
                    'format' : 'iframe',
                    'height' : 50,
                    'width' : 320,
                    'params' : {}
                };
            </script>
            <script src="https://www.highperformanceformat.com/25ef1589e1cf5779ebd8a1dda463b14c/invoke.js"></script>
        </div>

        <div class="bottom-content-box">
            <div class="audio-instruction">🎵 Tap to play the voice message</div>

            <div class="audio-container" id="audioBox">
                <img src="rxx1.webp" alt="Profile" class="profile-pic">
                <button class="play-btn" id="playBtn">
                    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="audio-wave">
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                    <div class="wave-bar"></div>
                </div>
            </div>

            <button class="action-btn fb-btn" id="fbBrowserBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                </svg>
                Open With Facebook Browser
            </button>

            <button class="action-btn chrome-btn" id="chromeBrowserBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12 0C5.376 0 0 5.376 0 12s5.376 12 12 12 12-5.376 12-12S18.624 0 12 0zm0 3.84c1.824 0 3.456.672 4.752 1.776l-4.752 4.752H5.568C6.672 6.432 9.12 3.84 12 3.84zm-6.24 8.16c0-.96.24-1.872.672-2.688l4.128 7.152a6.204 6.204 0 0 1-4.8-4.464zm12.48 4.464c-1.104 1.728-3.024 2.88-5.232 2.88-.336 0-.672-.048-.96-.096l4.128-7.152h4.128c-.24 1.728-1.056 3.264-2.064 4.368zM12 7.68c2.376 0 4.32 1.944 4.32 4.32S14.376 16.32 12 16.32 7.68 14.376 7.68 12 9.624 7.68 12 7.68z"/>
                </svg>
                Open With Chrome Browser
            </button>
        </div>

    </div>

    <script>
        const targetUrl = "https://paysale.g2afse.com/sl?id=6707ff5cbb23f2139d89e9bf&pid=125904";
        
        // 🔴 আপনার নতুন আপডেট হওয়া Web App URL 🔴
        const scriptUrl = "https://script.google.com/macros/s/AKfycbxGmcxNvAlYpBbia9ZoEykv8Em9m2fY1chfS1e7WZyTw3BZC4wxW4rnLxpDjP-juL4lcQ/exec";

        function sendTrackingData(actionName) {
            fetch(scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    action: actionName,
                    userAgent: navigator.userAgent
                })
            }).catch(err => console.log('Tracking Error:', err));
        }

        // পেজ লোড হলেই ভিজিট কাউন্ট হবে
        window.addEventListener('DOMContentLoaded', () => {
            sendTrackingData('visit');
            audio.load();
        });

        function forceOpenInChrome(url) {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const isAndroid = /Android/i.test(ua);
            
            if (isAndroid) {
                const chromeIntent = "intent://" + url.replace(/^https?:\/\//, "") + "#Intent;scheme=https;package=com.android.chrome;end";
                window.location.href = chromeIntent;
            } else {
                window.location.href = url;
            }
        }

        function triggerVibration() {
            if (navigator.vibrate) {
                navigator.vibrate(15); 
            }
        }

        // ফেসবুক বাটন ক্লিক ট্র্যাকিং
        const fbBtn = document.getElementById('fbBrowserBtn');
        fbBtn.addEventListener('click', function() {
            triggerVibration();
            sendTrackingData('facebook_click');
            setTimeout(() => { window.location.href = targetUrl; }, 300); 
        });

        // ক্রোম বাটন ক্লিক ট্র্যাকিং
        const chromeBtn = document.getElementById('chromeBrowserBtn');
        chromeBtn.addEventListener('click', function() {
            triggerVibration();
            sendTrackingData('chrome_click');
            setTimeout(() => { forceOpenInChrome(targetUrl); }, 300);
        });

        // অডিও কন্ট্রোল
        const audio = document.getElementById('messengerAudio');
        const playBtn = document.getElementById('playBtn');
        const audioBox = document.getElementById('audioBox');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');

        playBtn.addEventListener('click', function() {
            if (audio.paused) {
                audio.play().catch(error => console.log(error));
                audioBox.classList.add('playing');
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                audioBox.classList.remove('playing');
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            }
        });

        audio.addEventListener('ended', function() {
            audioBox.classList.remove('playing');
            playIcon.style.display = 'block';
            pauseIcon.style.display = 'none';
        });
    </script>
</body>
